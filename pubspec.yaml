name: timer_doctor
description: A cycling focus timer with cross-platform notifications
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  flutter_riverpod: ^2.5.0
  shared_preferences: ^2.2.0
  tray_manager: ^0.2.1
  window_manager: ^0.4.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
